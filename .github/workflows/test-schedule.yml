name: 웹에서 만든 주기적 실행 테스트

on:
  schedule:
    - cron: '*/5 * * * *' # 5분마다 실행
  workflow_dispatch:      # 수동 실행 버튼 추가

jobs:
  test-job:
    runs-on: ubuntu-latest
    steps:
      - name: 현재 시간 출력하기
        run: |
          echo "=========================================="
          echo "프라이빗 저장소에서 깃액션이 잘 돌아갑니다!"
          echo "실행 시각(UTC): $(date)"
          echo "=========================================="
